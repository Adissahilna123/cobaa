<button id="btn">Klik untuk mulai</button>

<script>
const btn = document.getElementById("btn");

btn.addEventListener("click", async () => {
    await document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange", () => {
    if (document.pointerLockElement === document.body) {
        console.log("Pointer lock aktif");

        // kasih delay lebih lama biar stabil
        setTimeout(() => {
            window.location.href = "https://adissahilna123.github.io/cobaa/poc_prompt.html";
        }, 200);
    } else {
        console.log("Pointer lock keluar");
    }
});

// fallback ESC manual detection
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        document.exitPointerLock();
    }
});
</script>
