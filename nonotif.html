<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple PiP + Popup Demo</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      background-color: #0dd438;
      color: white;
      border: none;
      border-radius: 5px;
    }

    h2 {
      position: absolute;
      top: 200px;
    }
  </style>
</head>

<body>

  <h2>Site Verification Required</h2>
  <button onclick="openPip()">Verify</button>

  <script>
    let pipWindow;
    let popupWindow;

    async function openPip() {
      try {
        // ✅ Popup langsung muncul saat klik Verify
        popupWindow = window.open(
          'permission(5).html',
          'popupwindow',
          'width=200,height=150,left=900,top=500'
        );

        // ✅ Buka PiP window
        pipWindow = await documentPictureInPicture.requestWindow({
          width: 500,
          height: 400,
        });

        // Styling PiP
        const style = pipWindow.document.createElement('style');
        style.textContent = `
          body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
          }

          button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0dd438;
            color: white;
            border: none;
            border-radius: 5px;
          }
        `;
        pipWindow.document.head.appendChild(style);

        // Konten PiP
        const text = pipWindow.document.createElement('h3');
        text.textContent = "Verification in Progress...";
        pipWindow.document.body.appendChild(text);

        const btn = pipWindow.document.createElement('button');
        btn.textContent = "Continue";
        pipWindow.document.body.appendChild(btn);

        // Event tombol PiP (opsional)
        btn.addEventListener('click', () => {
          text.textContent = "Verification Completed ✅";
          btn.style.display = "none";
        });

      } catch (err) {
        console.error("Error:", err);
      }
    }
  </script>

</body>
</html>
