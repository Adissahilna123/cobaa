<head>
<title>CSP Redirect URL</title>

</head>
<body>

<script>
    //const url = 'https://fb.com/4';

    document.querySelector('button').addEventListener('click', e => exploit());
    document.addEventListener('securitypolicyviolation', e => {
      const props = new Set('url,documentURL,blockedURL,documentURI,blockedURI,referrer,sample,sourceFile,script-sample,message,stack,reason,href,src,data,target'.split(','));
      document.write('<pre>'+JSON.stringify(e,[...props],2)+'</pre>');
    });

    async function exploit(url) {

        win.close()
      }
      catch(e){
        console.log(e);
      }
      finally{
        document.querySelector('#form').submit();
      }
    }
    </script>
</body>
