<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arc Origin Visibility Test</title>
<style>
body { font-family: sans-serif; text-align: center; margin-top: 100px; }
button { padding: 15px 30px; font-size: 18px; }
</style>
</head>
<body>

<h2>Popup Origin Visibility Test</h2>
<button onclick="openTest()">Open Secure Popup</button>

<script>
function openTest() {
    const testWindow = window.open(
        "https://example.com",
        "_blank"
    );

    setTimeout(() => {
        try {
            testWindow.document.title = "Testing Origin Visibility";
        } catch (e) {
            console.log("Cross-origin access blocked (expected)");
        }
    }, 1000);
}
</script>

</body>
</html>
