<!DOCTYPE html>
<html>
<head>
<title>Fullscreen + Calendar via Link</title>
<style>
  body {
    margin: 0;
    height: 0%;
    background: #111;
    color: white;
    font-family: Arial;
  }

  #container {
    position: absolute;
    top: 0%;
    left: 38%;
    transform: translateX(-50%);
    text-align: center;
  }

  /* sembunyikan input */
  #g {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>

<body>
<div id="container">
  <input type="datetime-local" id="g">
</div>

<script>
function openCalendar() {
  let input = document.getElementById("g");

  input.focus();

  if (input.showPicker) {
    input.showPicker();
  }
}

// ENTER KEY
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {

    // FULLSCREEN
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    }

    setTimeout(() => {
      openCalendar();
    }, 200);
  }
});

// KLIK LINK
document.getElementById("trigger").onclick = function(e) {
  e.preventDefault();
  openCalendar();
};
</script>

</body>
</html>
