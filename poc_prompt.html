<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Session Verification Demo</title>
<style>
body {
    font-family: sans-serif;
    background: #f1f3f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 8px;
    width: 320px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
}
.note {
    font-size: 12px;
    color: #777;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="box">
    <h3>Session Verification</h3>
    <p>Silakan masukkan data untuk melanjutkan (demo saja).</p>

    <input type="text" placeholder="Email (demo)">
    <input type="password" placeholder="Password (demo)">
    <button onclick="alert('Ini hanya simulasi, tidak ada data dikirim')">
        Lanjutkan
    </button>

    <div class="note">
        ⚠️ Ini hanya halaman demo untuk pengujian UI, bukan login asli.
    </div>
</div>

</body>
</html>
